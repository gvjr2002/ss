<!DOCTYPE html>
<html>
<head>
  <script referrerpolicy="no-referrer-when-downgrade" src="https://dev.visualwebsiteoptimizer.com/cloud-run-test/final/29000586.js" id="vwoCode"></script>
<title>Tracking Lab – Shadow DOM + Nested Iframes</title>
<style>
  body { font-family: Arial; padding:20px }
  section { border:1px solid #ccc; padding:15px; margin:20px 0 }
  button { padding:8px 14px; margin:6px }
</style>
</head>
<body>

<h1>Event Tracking Playground</h1>

<!-- NORMAL DOM -->
<section>
  <h2>Normal DOM</h2>
  <button id="normal-btn">Normal Button</button>
  <input id="normal-input" placeholder="Type here">
</section>

<!-- SHADOW HOST -->
<section>
  <h2>Nested Shadow DOM</h2>
  <div id="outer-shadow-host"></div>
</section>

<!-- IFRAME -->
<section>
  <h2>Nested Iframes</h2>
  <iframe id="outer-iframe" style="width:100%;height:200px;"></iframe>
</section>

<script>
/***********************
 GLOBAL LOGGER
************************/
function logEvent(name){
  console.log("EVENT FIRED →", name);
}

/***********************
 NORMAL DOM EVENTS
************************/
document.getElementById("normal-btn")
  .addEventListener("click", ()=>logEvent("Normal Button Click"));

document.getElementById("normal-input")
  .addEventListener("input", ()=>logEvent("Normal Input Typing"));

/***********************
 NESTED SHADOW DOM
************************/

// OUTER SHADOW HOST
const outerHost = document.querySelector("#outer-shadow-host");
const outerShadow = outerHost.attachShadow({mode:"open"});

outerShadow.innerHTML = `
  <div style="border:1px dashed blue; padding:10px;">
    <h3>Outer Shadow Root</h3>
    <button id="outer-shadow-btn">Outer Shadow Button</button>
    <inner-widget></inner-widget>
  </div>
`;

// INNER SHADOW HOST (custom element)
class InnerWidget extends HTMLElement {
  constructor(){
    super();
    const innerShadow = this.attachShadow({mode:"open"});
    innerShadow.innerHTML = `
      <div style="border:1px dashed red; padding:10px;">
        <h4>Inner Shadow Root</h4>
        <button id="inner-shadow-btn">Inner Shadow Button</button>
        <input id="inner-shadow-input" placeholder="Shadow typing">
      </div>
    `;

    // events inside inner shadow
    innerShadow.querySelector("#inner-shadow-btn")
      .addEventListener("click", ()=>logEvent("Inner Shadow Button"));

    innerShadow.querySelector("#inner-shadow-input")
      .addEventListener("input", ()=>logEvent("Inner Shadow Typing"));
  }
}

customElements.define("inner-widget", InnerWidget);

// outer shadow event
outerShadow.querySelector("#outer-shadow-btn")
  .addEventListener("click", ()=>logEvent("Outer Shadow Button"));

/***********************
 NESTED IFRAMES
************************/

const outerIframe = document.getElementById("outer-iframe");

outerIframe.srcdoc = `
<html>
<body style="font-family:Arial">

<h3>Outer Iframe</h3>
<button id="iframe-btn">Iframe Button</button>

<iframe id="inner-iframe" style="width:100%;height:120px;"></iframe>

<script>
document.getElementById("iframe-btn")
  .addEventListener("click", ()=>console.log("EVENT FIRED → Outer Iframe Button"));

const innerFrame = document.getElementById("inner-iframe");

innerFrame.srcdoc = \`
<html>
<body style="font-family:Arial">
<h4>Inner Iframe</h4>
<button id="deep-btn">Deep Iframe Button</button>
<input id="deep-input" placeholder="Type inside nested iframe">

<script>
document.getElementById("deep-btn")
  .addEventListener("click", ()=>console.log("EVENT FIRED → Deep Iframe Button"));

document.getElementById("deep-input")
  .addEventListener("input", ()=>console.log("EVENT FIRED → Deep Iframe Typing"));
<\/script>

</body>
</html>\`;
<\/script>

</body>
</html>
`;

</script>
</body>
</html>
